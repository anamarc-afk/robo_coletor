# costmap_common_params.yaml - adapted for ROS Noetic / TurtleBot3

map_type: costmap

transform_tolerance: 2.0
obstacle_range: 3.0
raytrace_range: 3.5

# TurtleBot3 burger footprint (approximate circle r=0.105)
robot_radius: 0.105

footprint_padding: 0.03

inflation_radius: 0.35
cost_scaling_factor: 10.0

lethal_cost_threshold: 100

# TurtleBot3 LiDAR: topic=/scan, frame=base_scan
observation_sources: laser_scan_sensor
laser_scan_sensor:
  sensor_frame: base_scan
  data_type: LaserScan
  topic: /scan
  marking: true
  clearing: true
  max_obstacle_height: 2.0
  min_obstacle_height: 0.0
